version: '3.8'

services:
  mailhog:
    image: mailhog/mailhog:latest
    container_name: mailhog
    ports:
      - "1025:1025"   # SMTP (для сервера)
      - "8025:8025"   # Web UI: http://localhost:8025
    restart: unless-stopped
    networks:
      - app_network

  server:
    build: ./EchoServer
    container_name: tcp_math_server
    ports:
      - "33333:33333"
    volumes:
      - db_data:/app/data
    depends_on:
      - mailhog
    restart: unless-stopped
    networks:
      - app_network

networks:
  app_network:
    driver: bridge

volumes:
  db_data:
